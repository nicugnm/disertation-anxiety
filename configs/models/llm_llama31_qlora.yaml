name: llama31_8b_qlora
model_type: llm_causal
text_field: clean_text
target: ha            # r/HealthAnxiety (1) vs r/Anxiety (0) head-to-head

pretrained: meta-llama/Llama-3.1-8B-Instruct
load_in_4bit: true    # QLoRA: 4-bit NF4 base + LoRA adapters
batch_size: 8
char_cap: 1600
tokenizer:
  max_length: 1024

lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

train:
  num_train_epochs: 1
  learning_rate: 2.0e-4
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 2
  max_train: 12000
