name: mentalbert_anxiety
model_type: transformer
text_field: clean_text
target: anxiety

# MentalBERT/MentalRoBERTa from "Ji et al., 2022. MentalBERT: Publicly Available Pretrained Language Models for Mental Healthcare"
# Falls back to roberta-base if MentalBERT not accessible.
pretrained: mental/mental-roberta-base
fallback_pretrained: roberta-base

tokenizer:
  max_length: 256
  truncation: true

train:
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  num_train_epochs: 4
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  gradient_accumulation_steps: 1
  fp16: false  # set true on CUDA
  evaluation_strategy: epoch
  save_strategy: epoch
  load_best_model_at_end: true
  metric_for_best_model: f1
  greater_is_better: true
  random_state: 42

splits:
  test_size: 0.15
  val_size: 0.15
